<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💖 Date Request · magical finale</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #ffe9f0 0%, #ffd9e5 100%);
            margin: 0;
            padding: 20px;
            transition: background 0.4s ease;
            overflow-x: hidden;
        }

        /* ---------- CARD ---------- */
        .card {
            background: rgba(255, 245, 248, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 2.5rem 2rem;
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(215, 50, 90, 0.15),
                        0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            text-align: center;
            max-width: 420px;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255, 220, 230, 0.6);
            position: relative;
            z-index: 10;
        }

        .card:hover {
            box-shadow: 0 30px 55px rgba(215, 50, 90, 0.2);
        }

        h2 {
            font-weight: 700;
            font-size: 1.9rem;
            letter-spacing: -0.5px;
            color: #a02c4e;
            margin-top: 0.2rem;
            margin-bottom: 1.2rem;
            line-height: 1.3;
            text-shadow: 0 2px 10px rgba(255, 180, 200, 0.3);
            word-break: break-word;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 20px 0 10px;
            position: relative;
            min-height: 85px;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 8px 18px rgba(200, 70, 110, 0.15);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: #a02c4e;
            border: 1px solid #fccad7;
            position: relative;
            min-width: 100px;
        }

        .btn-yes {
            background: #ec407a;
            color: white;
            border: 1px solid #d81b60;
            box-shadow: 0 12px 24px rgba(215, 50, 90, 0.3);
        }

        .btn-yes:hover {
            background: #d81b60;
            transform: scale(1.04);
            box-shadow: 0 16px 32px rgba(215, 50, 90, 0.4);
        }

        .btn-no {
            background: #f5f0f2;
            color: #4a2c36;
            border: 1px solid #e2c8d0;
            transition: all 0.05s linear;
            position: relative;
            z-index: 10;
            min-width: 100px;
        }

        input {
            padding: 14px 18px;
            border-radius: 50px;
            border: 1px solid #fbc4d3;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            font-size: 1rem;
            width: 100%;
            max-width: 240px;
            margin: 10px 0 8px;
            transition: 0.2s;
            color: #2d1a22;
            font-weight: 500;
            outline: none;
        }

        input:focus {
            border-color: #ec407a;
            box-shadow: 0 0 0 4px rgba(236, 64, 122, 0.15);
            background: white;
        }

        .btn-set, .btn-food {
            background: #ec407a;
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 16px rgba(215, 50, 90, 0.2);
            margin: 8px 6px;
            border: 1px solid #d81b60;
        }

        .btn-set:hover, .btn-food:hover {
            background: #d81b60;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 14px 28px rgba(215, 50, 90, 0.3);
        }

        .food-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 20px 0 10px;
        }

        .btn-food {
            background: white;
            color: #a02c4e;
            border: 1px solid #fccad7;
            min-width: 90px;
            font-size: 1.1rem;
            padding: 12px 22px;
        }

        .btn-food:hover {
            background: #ffeef2;
            border-color: #ec407a;
        }

        .hidden {
            display: none !important;
        }

        #finalText {
            font-size: 1.5rem;
            line-height: 1.5;
            white-space: pre-line;
            color: #2d1a22;
            background: rgba(255, 245, 248, 0.3);
            padding: 20px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .sub-message {
            margin-top: 16px;
            color: #b05a72;
            font-style: italic;
            font-weight: 400;
            font-size: 1rem;
            opacity: 0.8;
        }

        /* ---------- FINAL PAGE OVERLAY (fireworks, hearts, flowers) ---------- */
        #finalPageCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* the card on final step gets a little extra glow */
        #step4.card {
            border: 2px solid rgba(236, 64, 122, 0.3);
            box-shadow: 0 0 40px rgba(236, 64, 122, 0.2);
            animation: gentlePulse 2s infinite alternate ease-in-out;
        }

        @keyframes gentlePulse {
            0% { box-shadow: 0 0 30px rgba(236, 64, 122, 0.15); }
            100% { box-shadow: 0 0 60px rgba(236, 64, 122, 0.3); }
        }

        /* responsive */
        @media (max-width: 450px) {
            .card { padding: 1.8rem 1.2rem; }
            h2 { font-size: 1.6rem; }
            .btn { min-width: 80px; padding: 12px 20px; }
        }

        .btn-no {
            transition: left 0.08s ease, top 0.08s ease, right 0.08s ease, bottom 0.08s ease, background 0.2s;
        }

        /* floating hearts/flowers are drawn on canvas, no extra style needed */
    </style>
</head>
<body>

    <!-- CANVAS for fireworks + hearts + flowers (always on top, pointer-events: none) -->
    <canvas id="finalPageCanvas"></canvas>

    <!-- ========== STEP 1 ========== -->
    <div id="step1" class="card">
        <h2>🌸 Will you go on a date with me? 🌸</h2>
        <div class="btn-group" id="btnGroup">
            <button class="btn btn-yes" onclick="showStep('step2')">YES ❤️</button>
            <button class="btn btn-no" id="noButton">No 🙈</button>
        </div>
        <div style="margin-top: 20px; font-size: 0.9rem; color: #b05a72; opacity: 0.7;">
            ✨ (try to click no, i dare you) ✨
        </div>
    </div>

    <!-- ========== STEP 2 ========== -->
    <div id="step2" class="card hidden">
        <h2>So... when are you free? 🗓️</h2>
        <input type="date" id="dateInput" />
        <br />
        <button class="btn-set" onclick="saveDate()">Set the date ❤️</button>
    </div>

    <!-- ========== STEP 3 ========== -->
    <div id="step3" class="card hidden">
        <h2>What are we feeling? 🍽️</h2>
        <div class="food-row">
            <button class="btn-food" onclick="finish('Pizza')">🍕 Pizza</button>
            <button class="btn-food" onclick="finish('Pasta')">🍝 Pasta</button>
            <button class="btn-food" onclick="finish('Sushi')">🍣 Sushi</button>
        </div>
    </div>

    <!-- ========== STEP 4 (final) ========== -->
    <div id="step4" class="card hidden">
        <h2 id="finalText"></h2>
        <p class="sub-message"><i>✨ (I'm not like other guys xx) ✨</i></p>
    </div>

    <script>
        (function() {
            // ----- DOM refs -----
            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            const step3 = document.getElementById('step3');
            const step4 = document.getElementById('step4');
            const noBtn = document.getElementById('noButton');
            const btnGroup = document.getElementById('btnGroup');
            const dateInput = document.getElementById('dateInput');

            let selectedDate = "";

            // global showStep
            window.showStep = function(stepId) {
                document.querySelectorAll('.card').forEach(div => div.classList.add('hidden'));
                document.getElementById(stepId).classList.remove('hidden');

                // if we show step4, start the celebration!
                if (stepId === 'step4') {
                    startCelebration();
                } else {
                    // if we leave step4, stop celebration (but we never leave step4 in this flow)
                    // but we handle it anyway.
                }
            };

            window.saveDate = function() {
                selectedDate = dateInput.value;
                if (!selectedDate) {
                    alert("💕 Please pick a date, sweetheart!");
                    return;
                }
                showStep('step3');
            };

            window.finish = function(food) {
                const finalEl = document.getElementById('finalText');
                finalEl.innerText = `YAY!! 🎉 \n\n Date: ${selectedDate} \n Food: ${food} \n\n I can't wait to see you! 🌹`;
                showStep('step4');
            };

            // ----- NO BUTTON EVASION (same as before) -----
            function moveNoButton() {
                if (!noBtn || !btnGroup) return;
                const containerRect = btnGroup.getBoundingClientRect();
                const btnRect = noBtn.getBoundingClientRect();
                const btnWidth = btnRect.width;
                const btnHeight = btnRect.height;
                const margin = 10;
                const maxX = containerRect.width - btnWidth - margin;
                const maxY = containerRect.height - btnHeight - margin;
                let x = Math.random() * Math.max(0, maxX);
                let y = Math.random() * Math.max(0, maxY);
                x = Math.min(Math.max(x, margin), containerRect.width - btnWidth - margin);
                y = Math.min(Math.max(y, margin), containerRect.height - btnHeight - margin);
                noBtn.style.position = 'relative';
                noBtn.style.left = x + 'px';
                noBtn.style.top = y + 'px';
                noBtn.style.right = 'auto';
                noBtn.style.bottom = 'auto';
                const rotation = (Math.random() - 0.5) * 12;
                noBtn.style.transform = `rotate(${rotation}deg) scale(0.98)`;
                setTimeout(() => {
                    noBtn.style.transform = `rotate(0deg) scale(1)`;
                }, 200);
            }

            if (noBtn) {
                noBtn.addEventListener('mouseover', moveNoButton);
                noBtn.addEventListener('mousemove', moveNoButton);
                noBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    moveNoButton();
                });
                window.addEventListener('resize', function() {
                    if (!step1.classList.contains('hidden')) moveNoButton();
                });
                window.addEventListener('load', function() {
                    setTimeout(() => { if (!step1.classList.contains('hidden')) moveNoButton(); }, 50);
                });
                const originalShowStep = window.showStep;
                window.showStep = function(stepId) {
                    document.querySelectorAll('.card').forEach(div => div.classList.add('hidden'));
                    document.getElementById(stepId).classList.remove('hidden');
                    if (stepId === 'step1') setTimeout(moveNoButton, 30);
                    if (stepId === 'step4') startCelebration();
                };
                const card = document.querySelector('.card');
                if (card) {
                    card.addEventListener('mouseenter', function() {
                        if (!step1.classList.contains('hidden')) moveNoButton();
                    });
                }
            }

            // set default date
            (function() {
                if (dateInput) {
                    const tomorrow = new Date();
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    const year = tomorrow.getFullYear();
                    const month = String(tomorrow.getMonth() + 1).padStart(2, '0');
                    const day = String(tomorrow.getDate()).padStart(2, '0');
                    dateInput.value = `${year}-${month}-${day}`;
                }
            })();

            // ---------- CELEBRATION: FIREWORKS + HEARTS + FLOWERS ----------
            const canvas = document.getElementById('finalPageCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            let hearts = [];
            let flowers = [];
            let animationFrame;
            let celebrationActive = false;

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ----- particle (firework) -----
            class Particle {
                constructor(x, y, color) {
                    this.x = x;
                    this.y = y;
                    this.color = color || `hsl(${Math.random() * 360}, 80%, 65%)`;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 6 + 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed - 1.5;
                    this.size = Math.random() * 6 + 3;
                    this.life = 1;
                    this.decay = 0.008 + Math.random() * 0.015;
                    this.gravity = 0.06;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += this.gravity;
                    this.vx *= 0.99;
                    this.life -= this.decay;
                    this.size *= 0.998;
                }
                draw(ctx) {
                    ctx.save();
                    ctx.globalAlpha = this.life * 0.9;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, Math.max(0.5, this.size), 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.restore();
                }
            }

            // ----- heart (floating) -----
            class Heart {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = height + 20 + Math.random() * 100;
                    this.size = 16 + Math.random() * 28;
                    this.speed = 0.8 + Math.random() * 1.8;
                    this.wobble = Math.random() * 100;
                    this.wobbleSpeed = 0.02 + Math.random() * 0.03;
                    this.opacity = 0.6 + Math.random() * 0.4;
                    this.color = `hsl(${340 + Math.random() * 30}, 90%, 70%)`;
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotSpeed = (Math.random() - 0.5) * 0.02;
                }
                update() {
                    this.y -= this.speed;
                    this.wobble += this.wobbleSpeed;
                    this.x += Math.sin(this.wobble) * 0.6;
                    this.rotation += this.rotSpeed;
                    // reset if off screen
                    if (this.y < -80) {
                        this.y = height + 20 + Math.random() * 60;
                        this.x = Math.random() * width;
                    }
                }
                draw(ctx) {
                    ctx.save();
                    ctx.globalAlpha = this.opacity;
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.scale(this.size / 30, this.size / 30);
                    // heart path
                    ctx.beginPath();
                    ctx.moveTo(0, 5);
                    ctx.bezierCurveTo(-10, -8, -20, 4, 0, 16);
                    ctx.bezierCurveTo(20, 4, 10, -8, 0, 5);
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 20;
                    ctx.fill();
                    ctx.restore();
                }
            }

            // ----- flower (falling) -----
            class Flower {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = -20 - Math.random() * 100;
                    this.size = 12 + Math.random() * 22;
                    this.speed = 0.6 + Math.random() * 1.6;
                    this.wobble = Math.random() * 100;
                    this.wobbleSpeed = 0.015 + Math.random() * 0.025;
                    this.opacity = 0.7 + Math.random() * 0.3;
                    const hue = Math.random() * 60 + 320; // pink/purple/red
                    this.color = `hsl(${hue}, 80%, 70%)`;
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotSpeed = (Math.random() - 0.5) * 0.03;
                    this.petals = 5 + Math.floor(Math.random() * 4);
                }
                update() {
                    this.y += this.speed;
                    this.wobble += this.wobbleSpeed;
                    this.x += Math.sin(this.wobble) * 0.7;
                    this.rotation += this.rotSpeed;
                    if (this.y > height + 60) {
                        this.y = -20 - Math.random() * 80;
                        this.x = Math.random() * width;
                    }
                }
                draw(ctx) {
                    ctx.save();
                    ctx.globalAlpha = this.opacity;
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    const s = this.size / 20;
                    ctx.scale(s, s);
                    // draw simple flower: petals around center
                    const petalCount = this.petals;
                    for (let i = 0; i < petalCount; i++) {
                        const angle = (i / petalCount) * Math.PI * 2;
                        ctx.save();
                        ctx.rotate(angle);
                        ctx.beginPath();
                        ctx.ellipse(8, 0, 10, 6, 0, 0, Math.PI * 2);
                        ctx.fillStyle = this.color;
                        ctx.shadowColor = this.color;
                        ctx.shadowBlur = 15;
                        ctx.fill();
                        ctx.restore();
                    }
                    // center
                    ctx.beginPath();
                    ctx.arc(0, 0, 5, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffe066';
                    ctx.shadowBlur = 10;
                    ctx.fill();
                    ctx.restore();
                }
            }

            // ----- spawn fireworks -----
            function spawnFirework() {
                const x = Math.random() * width * 0.6 + width * 0.2;
                const y = Math.random() * height * 0.4 + height * 0.1;
                const color = `hsl(${Math.random() * 360}, 85%, 65%)`;
                const count = 40 + Math.floor(Math.random() * 40);
                for (let i = 0; i < count; i++) {
                    particles.push(new Particle(x, y, color));
                }
            }

            // ----- init celebration -----
            function startCelebration() {
                if (celebrationActive) return;
                celebrationActive = true;

                // clear old particles
                particles = [];
                hearts = [];
                flowers = [];

                // populate hearts & flowers
                for (let i = 0; i < 25; i++) hearts.push(new Heart());
                for (let i = 0; i < 20; i++) flowers.push(new Flower());

                // spawn a few fireworks immediately
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => spawnFirework(), i * 200);
                }

                // start animation loop
                if (animationFrame) cancelAnimationFrame(animationFrame);
                animateCelebration();

                // auto-spawn fireworks every 1.2s
                if (window._fireworkInterval) clearInterval(window._fireworkInterval);
                window._fireworkInterval = setInterval(() => {
                    if (celebrationActive) {
                        spawnFirework();
                        // occasionally spawn extra
                        if (Math.random() > 0.6) setTimeout(spawnFirework, 300);
                    }
                }, 1200);
            }

            function stopCelebration() {
                celebrationActive = false;
                if (window._fireworkInterval) {
                    clearInterval(window._fireworkInterval);
                    window._fireworkInterval = null;
                }
                if (animationFrame) {
                    cancelAnimationFrame(animationFrame);
                    animationFrame = null;
                }
                ctx.clearRect(0, 0, width, height);
            }

            function animateCelebration() {
                if (!celebrationActive) {
                    ctx.clearRect(0, 0, width, height);
                    return;
                }
                ctx.clearRect(0, 0, width, height);

                // update & draw hearts
                hearts.forEach(h => { h.update(); h.draw(ctx); });
                // update & draw flowers
                flowers.forEach(f => { f.update(); f.draw(ctx); });

                // update & draw particles (fireworks)
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.update();
                    p.draw(ctx);
                    if (p.life <= 0 || p.size < 0.3) {
                        particles.splice(i, 1);
                    }
                }

                // occasionally spawn new heart/flower if count low
                if (hearts.length < 20) hearts.push(new Heart());
                if (flowers.length < 15) flowers.push(new Flower());

                animationFrame = requestAnimationFrame(animateCelebration);
            }

            // override showStep to stop celebration when leaving step4
            const originalShowStep2 = window.showStep;
            window.showStep = function(stepId) {
                document.querySelectorAll('.card').forEach(div => div.classList.add('hidden'));
                document.getElementById(stepId).classList.remove('hidden');
                if (stepId === 'step1') setTimeout(moveNoButton, 30);
                if (stepId === 'step4') {
                    startCelebration();
                } else {
                    // if we go back from step4, stop celebration
                    stopCelebration();
                }
            };

            // also clean up if step4 is hidden by any means
            // we also expose stop for safety
            window.stopCelebration = stopCelebration;

            // if user leaves page, stop
            window.addEventListener('beforeunload', function() {
                stopCelebration();
            });

        })();
    </script>
</body>
</html>
